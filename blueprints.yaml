name: Copy as Markdown Button
version: 1.0.0
description: Adds a button to copy the page content as Markdown to the clipboard
icon: clipboard
author:
  name: tucho235
homepage: https://github.com/tucho235/grav-plugin-copy-as-markdown-button
keywords: markdown, clipboard, share, copy, button
bugs: https://github.com/tucho235/grav-plugin-copy-as-markdown-button/issues
license: MIT

form:
  validation: strict
  fields:
    enabled:
      type: toggle
      label: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.PLUGIN_STATUS
      highlight: 1
      default: 0
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    button_position:
      type: select
      label: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.BUTTON_POSITION
      default: bottom
      options:
        top: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.BUTTON_POSITION_TOP
        bottom: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.BUTTON_POSITION_BOTTOM
        both: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.BUTTON_POSITION_BOTH

    button_text:
      type: text
      label: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.BUTTON_TEXT_LABEL
      default: "PLUGIN_COPY_AS_MARKDOWN_BUTTON.BUTTON_TEXT"
      placeholder: "PLUGIN_COPY_AS_MARKDOWN_BUTTON.BUTTON_TEXT"

    show_icon:
      type: toggle
      label: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.SHOW_ICON
      highlight: 1
      default: 1
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    copied_text:
      type: text
      label: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.COPIED_TEXT_LABEL
      default: "PLUGIN_COPY_AS_MARKDOWN_BUTTON.COPIED_TEXT"
      placeholder: "PLUGIN_COPY_AS_MARKDOWN_BUTTON.COPIED_TEXT"

    include_title:
      type: toggle
      label: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.INCLUDE_TITLE
      help: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.INCLUDE_TITLE_HELP
      highlight: 1
      default: 1
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    include_frontmatter:
      type: toggle
      label: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.INCLUDE_FRONTMATTER
      help: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.INCLUDE_FRONTMATTER_HELP
      highlight: 0
      default: 0
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    page_types:
      type: array
      label: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.PAGE_TYPES
      help: PLUGIN_COPY_AS_MARKDOWN_BUTTON.ADMIN.PAGE_TYPES_HELP
      default:
        - default
        - post
